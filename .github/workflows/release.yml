name: Release

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and ensure tag
        id: tag
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$GH_REF" == refs/tags/* ]]; then
            VERSION="${GH_REF_NAME#v}"
            TAG="$GH_REF_NAME"
          else
            VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
            TAG="v$VERSION"
            if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists on origin; skipping release."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Validate plugin.json version matches tag
        if: steps.tag.outputs.skip != 'true'
        run: |
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$PLUGIN_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::plugin.json version ($PLUGIN_VERSION) does not match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Validate marketplace.json version matches tag
        if: steps.tag.outputs.skip != 'true'
        run: |
          MP_VERSION=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          if [ "$MP_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::marketplace.json plugins[0].version ($MP_VERSION) does not match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.tag.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "Grimoire ${{ steps.tag.outputs.tag }}" \
            --notes-file release-notes.md
